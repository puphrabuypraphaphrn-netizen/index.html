<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gacha Nature Theme</title>
    <style>
        :root {
            --nature-green: #2d5a27;
            --nature-leaf: #8eb94e;
            --nature-wood: #5d4037;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1542273917363-3b1817f69a2d?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: white;
        }

        /* ตกแต่งใบไม้ */
        .leaf-decor {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 40px;
        }

        .container {
            display: flex;
            gap: 50px;
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 4px solid var(--nature-wood);
        }

        .gacha-machine {
            text-align: center;
            padding: 20px;
            border-radius: 20px;
            width: 200px;
            transition: transform 0.3s;
        }

        .gacha-machine:hover { transform: scale(1.05); }

        /* ตู้สีฟ้า */
        .blue-machine { background: #3498db; border: 5px solid #2980b9; }
        /* ตู้สีเขียว */
        .green-machine { background: #2ecc71; border: 5px solid #27ae60; }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-info { background: #f1c40f; color: #333; }
        .btn-spin { background: white; color: #333; font-size: 1.1rem; }

        /* หน้าต่างลอยสุ่ม (Popup) */
        #gacha-popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            background: #222;
            padding: 5px;
            border-radius: 20px;
            /* กรอบสีรุ้ง */
            background-image: linear-gradient(45deg, red, orange, yellow, green, blue, indigo, violet);
            animation: rainbow-border 2s linear infinite;
            z-index: 100;
        }

        @keyframes rainbow-border {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        .popup-content {
            background: #111;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
        }

        .tier-ssr { color: #ffd700; font-size: 2rem; font-weight: bold; text-shadow: 0 0 10px gold; }
        .tier-sr { color: #c0c0c0; font-size: 1.5rem; }
        .tier-ss { color: #cd7f32; }
        .tier-s { color: #8eb94e; }

        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 90;
        }
    </style>
</head>
<body>

<div class="leaf-decor">🍃🍂🌲</div>

<div class="container">
    <div class="gacha-machine blue-machine">
        <h2>ตู้เงินสด</h2>
        <p>สะสม: <span id="pity-blue">0</span>/50</p>
        <button class="btn-info" onclick="showRate('cash')">ดูรางวัล/เรต</button>
        <button class="btn-spin" onclick="spin('cash')">สุ่ม (Free)</button>
    </div>

    <div class="gacha-machine green-machine">
        <h2>ตู้คอยน์</h2>
        <p>สะสม: <span id="pity-coin">0</span>/50</p>
        <button class="btn-info" onclick="showRate('coin')">ดูรางวัล/เรต</button>
        <button class="btn-spin" onclick="spin('coin')">สุ่ม (Free)</button>
    </div>
</div>

<div class="overlay" id="overlay" onclick="closePopup()"></div>
<div id="gacha-popup">
    <div class="popup-content">
        <p id="result-tier"></p>
        <h2 id="result-item"></h2>
        <button onclick="closePopup()">ตกลง</button>
    </div>
</div>

<script>
    let pityBlue = 0;
    let pityCoin = 0;

    const rewards = {
        cash: { SSR: "1,000$", SR: "50$", SS: "20$", S: "10$" },
        coin: { SSR: "250 Coin", SR: "50 Coin", SS: "20 Coin", S: "1 Coin" }
    };

    function showRate(type) {
        alert(`เรตติ้ง (ทั้ง 2 ตู้):\nSSR: 5%\nSR: 20%\nSS: 40%\nS: 55%\n\nรางวัลตู้${type === 'cash' ? 'ฟ้า' : 'เขียว'}:\nSSR: ${rewards[type].SSR}\nSR: ${rewards[type].SR}\nSS: ${rewards[type].SS}\nS: ${rewards[type].S}`);
    }

    function spin(type) {
        let pity = type === 'cash' ? ++pityBlue : ++pityCoin;
        document.getElementById(`pity-${type}`).innerText = pity;

        let rand = Math.random() * 100;
        let tier = "";

        // ระบบการันตี 50 ครั้ง
        if (pity >= 50) {
            tier = "SSR";
            if (type === 'cash') pityBlue = 0; else pityCoin = 0;
            document.getElementById(`pity-${type}`).innerText = 0;
        } else {
            if (rand < 5) tier = "SSR";
            else if (rand < 25) tier = "SR";
            else if (rand < 65) tier = "SS";
            else tier = "S";
            
            // ถ้าสุ่มได้ SSR เอง ให้รีเซ็ตการันตี
            if (tier === "SSR") {
                if (type === 'cash') pityBlue = 0; else pityCoin = 0;
                document.getElementById(`pity-${type}`).innerText = 0;
            }
        }

        showResult(tier, rewards[type][tier]);
    }

    function showResult(tier, item) {
        document.getElementById('result-tier').className = `tier-${tier.toLowerCase()}`;
        document.getElementById('result-tier').innerText = tier;
        document.getElementById('result-item').innerText = item;
        document.getElementById('gacha-popup').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
    }

    function closePopup() {
        document.getElementById('gacha-popup').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
    }
</script>

</body>
</html>
